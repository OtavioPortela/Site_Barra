version: '3.8'

services:

  db:
    image: postgres:15-alpine
    container_name: barra_confeccoes_db
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-barra_confeccoes}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      barra-network:
        aliases:
          - postgres

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: barra_confeccoes_web
    command: bash entrypoint.sh gunicorn --bind 0.0.0.0:8000 --workers 3 core.wsgi:application
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_HOST=db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - barra-network

volumes:
  postgres_data:
  static_volume:

networks:
  barra-network:
    driver: bridge

