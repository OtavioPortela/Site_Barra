[phases.setup]
nixPkgs = ["nodejs-22_x"]

[phases.install]
cmds = [
  "rm -rf node_modules package-lock.json || true",
  "npm install --legacy-peer-deps --prefer-offline --no-audit"
]

[phases.build]
cmds = [
  "rm -rf dist .vite node_modules/.vite || true",
  "npm run build"
]

[start]
cmd = "npx serve -s dist -l $PORT"
